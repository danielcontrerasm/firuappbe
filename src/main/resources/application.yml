spring:
  application:
    name: pettracker
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      continue-on-error: ${SPRING_SQL_INIT_CONTINUE_ON_ERROR:true}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pettracker}
    username: ${SPRING_DATASOURCE_USERNAME:petuser}
    password: ${SPRING_DATASOURCE_PASSWORD:petpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true

pettracker:
  security:
    default-jwt-secret: pettracker-local-development-secret-change-this-before-production-0123456789
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://firuappfe-production.up.railway.app}

jwt:
  # Local development fallback only. Railway deployments must set JWT_SECRET explicitly.
  secret: ${JWT_SECRET:${pettracker.security.default-jwt-secret}}
  expiration: ${JWT_EXPIRATION_MS:86400000}

demo:
  gps:
    enabled: true
    outside-interval-ms: 300000

geocoding:
  nominatim:
    enabled: ${GEOCODING_NOMINATIM_ENABLED:true}
    base-url: ${GEOCODING_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
    user-agent: ${GEOCODING_NOMINATIM_USER_AGENT:pettracker/1.0}

server:
  port: ${PORT:8080}
